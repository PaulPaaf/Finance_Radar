version: '3.3'

services:
  firefly_db:
    image: mariadb:lts
    container_name: firefly_db
    environment:
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
      - MYSQL_USER=firefly
      - MYSQL_PASSWORD=secret_password # <-- Puedes cambiar esto
      - MYSQL_DATABASE=firefly
    volumes:
      - firefly_db_data:/var/lib/mysql

  firefly_app:
    image: fireflyiii/core:latest
    container_name: firefly_app
    restart: always
    environment:
      - APP_KEY=${FIREFLY_APP_KEY}
      - DB_HOST=firefly_db
      - DB_PORT=3306
      - DB_CONNECTION=mysql
      - DB_DATABASE=firefly
      - DB_USERNAME=firefly
      - DB_PASSWORD=secret_password
      - APP_URL=http://localhost:8080
      - TZ=America/Argentina/Buenos_Aires
    ports:
      - 8080:8080
    depends_on:
      - firefly_db
    volumes:
      - firefly_app_upload:/var/www/html/storage/upload

volumes:
  firefly_db_data:
  firefly_app_upload: